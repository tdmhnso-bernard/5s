<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Apps Script Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #f8fafc, #f1f5f9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>

    <div class="max-w-md w-full glass-card rounded-3xl p-8 text-center animate-in fade-in zoom-in duration-500">
        <!-- Icon/Header -->
        <div class="mb-6 inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-slate-800 mb-2">Google Apps Script</h1>
        <p class="text-slate-500 mb-8">Access your deployed web application via the secure link below.</p>

        <!-- Main Action -->
        <a id="script-link" href="https://script.google.com/macros/s/AKfycbxS9IrYf5sJ4yHC8WnC_zS8C9dIM77cEKRpmTckDgfW0xoeJhfM2IStRWdCYzq0v9zFsQ/exec" target="_blank" class="block w-full py-4 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all transform hover:scale-[1.02] active:scale-95 mb-4 shadow-lg shadow-blue-200">
            Open Web App
        </a>

        <!-- Copy Link -->
        <button onclick="copyLink()" class="flex items-center justify-center gap-2 w-full py-3 text-slate-600 hover:text-blue-600 transition-colors text-sm font-medium">
            <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            <span id="copy-text">Copy URL to clipboard</span>
        </button>

        <!-- QR Code Section -->
        <div class="mt-8 pt-8 border-t border-slate-100">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Scan for mobile</p>
            <div class="flex justify-center">
                <div id="qrcode" class="p-2 bg-white rounded-lg border border-slate-100 shadow-sm"></div>
            </div>
        </div>

        <!-- Feedback Message -->
        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full text-sm opacity-0 transition-opacity pointer-events-none">
            Link copied!
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxS9IrYf5sJ4yHC8WnC_zS8C9dIM77cEKRpmTckDgfW0xoeJhfM2IStRWdCYzq0v9zFsQ/exec";

        // Generate QR Code
        window.onload = function() {
            new QRCode(document.getElementById("qrcode"), {
                text: scriptUrl,
                width: 128,
                height: 128,
                colorDark : "#1e293b",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };

        // Copy functionality
        function copyLink() {
            const el = document.createElement('textarea');
            el.value = scriptUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // UI Feedback
            const toast = document.getElementById('toast');
            const copyText = document.getElementById('copy-text');
            
            toast.style.opacity = '1';
            copyText.innerText = 'Copied!';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                copyText.innerText = 'Copy URL to clipboard';
            }, 2000);
        }
    </script>
</body>
</html>
